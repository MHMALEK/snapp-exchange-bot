# Build, push to GHCR (public), deploy to Oracle VM over SSH.
#
# Secrets → Settings → Secrets and variables → Actions:
#   VM_HOST, VM_USER, VM_SSH_KEY
#   TELEGRAM_BOT_TOKEN, DATABASE_URL, TELEGRAM_LISTINGS_CHANNEL_ID
#
# Env vars are passed through the SSH session into `docker run -e NAME` (no secrets
# embedded in the script text, so URLs and special characters stay safe).
#
# After first push: Packages → image → Package settings → Change visibility → Public
#
name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=${REGISTRY}/$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on VM
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_LISTINGS_CHANNEL_ID: ${{ secrets.TELEGRAM_LISTINGS_CHANNEL_ID }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,DATABASE_URL,TELEGRAM_LISTINGS_CHANNEL_ID
          script_stop: true
          script: |
            set -e
            for v in TELEGRAM_BOT_TOKEN DATABASE_URL TELEGRAM_LISTINGS_CHANNEL_ID; do
              eval "val=\$$v"
              if [ -z "$val" ]; then
                echo "$v secret must be set"
                exit 1
              fi
            done
            E="-e TELEGRAM_BOT_TOKEN -e DATABASE_URL -e TELEGRAM_LISTINGS_CHANNEL_ID"
            docker pull "${{ env.IMAGE_NAME }}:latest"
            docker stop exchange-money-bot 2>/dev/null || true
            docker rm exchange-money-bot 2>/dev/null || true
            docker run -d \
              --name exchange-money-bot \
              --restart unless-stopped \
              $E \
              -p 8000:8000 \
              "${{ env.IMAGE_NAME }}:latest"
            docker image prune -f
